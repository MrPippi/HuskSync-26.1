name: CI Tests

on:
  workflow_dispatch:
  push:
    branches: [ 'master' ]
    paths-ignore:
      - 'docs/**'
      - 'workflows/**'
      - 'README.md'

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout for CI 🛎️'
        uses: actions/checkout@v6
      - name: 'Set up JDKs (run Gradle on 21, toolchain compiles on 25) 📦'
        uses: actions/setup-java@v5
        with:
          # Gradle 8.14 cannot run on JDK 25; run it on 21. The foojay toolchain
          # resolver provisions JDK 25 for the 26.1.2 submodule's compile tasks.
          # Last-listed version becomes the default JAVA_HOME.
          java-version: |
            25
            21
          distribution: 'temurin'
      - name: 'Build with Gradle 🏗️'
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build test
      - name: 'Publish Test Report 📊'
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # Continue on failure
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'