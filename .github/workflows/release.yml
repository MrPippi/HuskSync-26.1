name: Release Tests & Publish

on:
  release:
    types: [ 'published' ]

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout for CI 🛎️'
        uses: actions/checkout@v6
      - name: 'Set up JDKs (run Gradle on 21, toolchain compiles on 25) 📦'
        uses: actions/setup-java@v5
        with:
          # Gradle 8.14 cannot run on JDK 25; run it on 21. The foojay toolchain
          # resolver provisions JDK 25 for the 26.1.2 submodule's compile tasks.
          # Last-listed version becomes the default JAVA_HOME.
          java-version: |
            25
            21
          distribution: 'temurin'
      - name: 'Build with Gradle 🏗️'
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build test publish
        env:
          RELEASES_MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          RELEASES_MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      - name: 'Publish Test Report 📊'
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # Continue on failure
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
      - name: 'Publish to William278.net 🚀'
        uses: WiIIiam278/bones-publish-action@v1
        with:
          api-key: ${{ secrets.BONES_API_KEY }}
          project: 'husksync'
          channel: 'release'
          version: ${{ github.event.release.tag_name }}
          changelog: ${{ github.event.release.body }}
          distro-names: |
            paper-1.21.1
            paper-1.21.4
            paper-1.21.5
            paper-1.21.8
            paper-1.21.10
            paper-26.1.2
            fabric-1.21.1
            fabric-1.21.4
            fabric-1.21.5
            fabric-1.21.8
          distro-groups: |
            paper
            paper
            paper
            paper
            paper
            paper
            fabric
            fabric
            fabric
            fabric
          distro-descriptions: |
            Paper 1.21.1
            Paper 1.21.4
            Paper 1.21.5
            Paper 1.21.8
            Paper 1.21.10
            Paper 26.1.2
            Fabric 1.21.1
            Fabric 1.21.4
            Fabric 1.21.5
            Fabric 1.21.8
          files: |
            target/HuskSync-Bukkit-${{ github.event.release.tag_name }}+mc.1.21.1.jar
            target/HuskSync-Bukkit-${{ github.event.release.tag_name }}+mc.1.21.4.jar
            target/HuskSync-Bukkit-${{ github.event.release.tag_name }}+mc.1.21.5.jar
            target/HuskSync-Bukkit-${{ github.event.release.tag_name }}+mc.1.21.8.jar
            target/HuskSync-Bukkit-${{ github.event.release.tag_name }}+mc.1.21.10.jar
            target/HuskSync-Bukkit-${{ github.event.release.tag_name }}+mc.26.1.2.jar
            target/HuskSync-Fabric-${{ github.event.release.tag_name }}+mc.1.21.1.jar
            target/HuskSync-Fabric-${{ github.event.release.tag_name }}+mc.1.21.4.jar
            target/HuskSync-Fabric-${{ github.event.release.tag_name }}+mc.1.21.5.jar
            target/HuskSync-Fabric-${{ github.event.release.tag_name }}+mc.1.21.8.jar